<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>C.H 洗衣小鎮</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e2e;font-family:'Microsoft JhengHei',sans-serif;touch-action:none}

/* ── 載入 ── */
#loading{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#0a0e2e,#1a2a6e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#loading .logo{font-size:80px;animation:pop 1.2s ease-in-out infinite}
#loading h1{font-size:26px;color:#ffd700;letter-spacing:2px}
#loading p{font-size:13px;color:rgba(255,255,255,.5)}
.bar{width:220px;height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#ffd700,#ff6b35,#ffd700);background-size:200%;animation:shimmer 1.4s linear infinite}
@keyframes pop{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-14px) scale(1.1)}}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

/* ── 頂部 ── */
#topBar{position:fixed;top:0;left:0;right:0;height:56px;z-index:200;background:rgba(8,14,46,.92);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(255,215,0,.25);display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.top-left{display:flex;align-items:center;gap:10px}
.av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid #ffd700;flex-shrink:0}
.pname{font-size:14px;font-weight:bold;color:#fff}
.plevel{font-size:11px;color:#ffd700}
.top-title{font-size:15px;font-weight:bold;color:#ffd700;letter-spacing:1px}

/* ── 世界視窗 ── */
#viewport{position:fixed;top:56px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#viewport.dragging{cursor:grabbing}

/* ── 單一容器，只移這個 ── */
#world{position:absolute;top:0;left:0;will-change:transform}

/* ── Canvas ── */
#mapCanvas{display:block;position:absolute;top:0;left:0}

/* ── 建築 & NPC ── */
.sprite{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;user-select:none;-webkit-user-select:none}
.sprite:active{transform:scale(.94)}
.building-img{font-size:64px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.6));transition:transform .15s}
.building-label{margin-top:2px;background:rgba(255,255,255,.92);color:#222;font-size:11px;font-weight:bold;padding:3px 10px;border-radius:12px;border:1.5px solid rgba(255,215,0,.6);white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.npc-wrap{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;user-select:none;z-index:20}
.npc-body{font-size:34px;will-change:transform}
.npc-shadow{width:26px;height:7px;background:rgba(0,0,0,.35);border-radius:50%;margin-top:-3px}
.npc-tag{font-size:10px;color:#fff;background:rgba(0,0,0,.65);padding:2px 8px;border-radius:8px;margin-top:4px;white-space:nowrap;border:1px solid rgba(255,255,255,.15)}
.npc-bubble{position:absolute;top:-34px;left:50%;transform:translateX(-50%);background:#fff;color:#333;font-size:11px;padding:3px 9px;border-radius:9px;white-space:nowrap;border:2px solid #ffd700;pointer-events:none;animation:bpop .25s ease-out;z-index:30}
.npc-bubble::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#ffd700}
@keyframes bpop{0%{transform:translateX(-50%) scale(.4);opacity:0}100%{transform:translateX(-50%) scale(1);opacity:1}}
.idle-anim{animation:idle 2.2s ease-in-out infinite}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.walk-anim{animation:walk .35s steps(2) infinite}
@keyframes walk{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ── 懸浮裝飾 ── */
.deco{position:absolute;pointer-events:none;font-size:28px;z-index:5}
.tree-sway{animation:tsway 2.8s ease-in-out infinite}
@keyframes tsway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.cloud{position:absolute;font-size:40px;opacity:.6;z-index:2;animation:float linear infinite}
@keyframes float{from{left:-80px}to{left:2100px}}

/* ── 對話框 ── */
#dlgOverlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
#dlgOverlay.show{opacity:1;pointer-events:all}
.dlg-sheet{width:100%;max-width:500px;background:linear-gradient(160deg,#111e4a,#0d1835);border-radius:22px 22px 0 0;border-top:3px solid rgba(255,215,0,.4);padding:20px 18px 36px;transform:translateY(100%);transition:transform .28s cubic-bezier(.25,.8,.25,1);box-shadow:0 -8px 40px rgba(0,0,0,.6)}
#dlgOverlay.show .dlg-sheet{transform:translateY(0)}
.dlg-handle{width:38px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 16px}
.dlg-head{display:flex;align-items:center;gap:13px;margin-bottom:14px}
.dlg-av{font-size:46px;flex-shrink:0}
.dlg-who{font-size:16px;font-weight:bold;color:#ffd700}
.dlg-role{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px}
.dlg-text{background:rgba(255,255,255,.05);border-left:3px solid rgba(255,215,0,.45);border-radius:10px;padding:13px 14px;font-size:15px;color:#f0f0f0;line-height:1.75;min-height:58px;margin-bottom:14px}
.dlg-opts{display:grid;gap:9px}
.cBtn{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.14);border-radius:13px;padding:12px 14px;color:#fff;font-size:14px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .18s,border-color .18s}
.cBtn:active{background:rgba(255,215,0,.18);border-color:#ffd700}

/* ── 店內場景 ── */
#shopOverlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
#shopOverlay.show{opacity:1;pointer-events:all}
.shop-panel{width:100%;max-width:500px;background:linear-gradient(160deg,#0d2040,#0a1628);border-radius:24px 24px 0 0;border-top:3px solid #4db8ff;padding:0 0 36px;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.8,.25,1);max-height:90vh;overflow-y:auto}
#shopOverlay.show .shop-panel{transform:translateY(0)}
.shop-scene{position:relative;height:220px;overflow:hidden;border-radius:24px 24px 0 0;background:linear-gradient(180deg,#e8f4ff 0%,#d0eaff 60%,#b8dcf8 100%)}
.shop-wall-item{position:absolute;font-size:28px}
.shop-counter{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(180deg,#8b6914,#5c4310);display:flex;align-items:center;padding:0 20px;gap:14px}
.shop-counter-top{position:absolute;top:-12px;left:0;right:0;height:14px;background:#a07820;border-radius:4px 4px 0 0}
.staff-figure{position:absolute;bottom:55px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;animation:staffBob 2.5s ease-in-out infinite}
@keyframes staffBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
.staff-emoji{font-size:52px}
.staff-badge{background:linear-gradient(135deg,#1a6eb5,#0d4a8a);color:#fff;font-size:10px;font-weight:bold;padding:3px 10px;border-radius:10px;border:1.5px solid rgba(255,255,255,.3);letter-spacing:1px;margin-top:4px;white-space:nowrap}
.shop-info{padding:18px 18px 4px}
.shop-title{font-size:20px;font-weight:bold;color:#4db8ff;margin-bottom:6px}
.shop-desc{font-size:13px;color:rgba(255,255,255,.65);line-height:1.7;margin-bottom:14px}
.shop-services{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.svc-card{background:rgba(77,184,255,.1);border:1px solid rgba(77,184,255,.25);border-radius:12px;padding:12px;text-align:center}
.svc-icon{font-size:26px;margin-bottom:6px}
.svc-name{font-size:13px;font-weight:bold;color:#fff}
.svc-desc{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
.staff-dlg-btn{width:calc(100% - 36px);margin:0 18px;padding:14px;background:linear-gradient(135deg,#4db8ff,#1a6eb5);color:#fff;font-size:15px;font-weight:bold;border:none;border-radius:13px;cursor:pointer}
.close-shop-btn{width:calc(100% - 36px);margin:10px 18px 0;padding:11px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);font-size:14px;border:1px solid rgba(255,255,255,.15);border-radius:11px;cursor:pointer}

/* ── 解謎 ── */
#quizOverlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
#quizOverlay.show{opacity:1;pointer-events:all}
.quiz-sheet{width:100%;max-width:500px;background:#0c1836;border-radius:22px 22px 0 0;border-top:3px solid #ffd700;padding:20px 18px 40px;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.8,.25,1);max-height:92vh;overflow-y:auto}
#quizOverlay.show .quiz-sheet{transform:translateY(0)}
.qhd{display:flex;align-items:center;margin-bottom:14px}
.qhd-title{font-size:18px;font-weight:bold;color:#ffd700}
.qstep{margin-left:auto;font-size:12px;color:rgba(255,255,255,.4)}
.qscene{background:rgba(255,255,255,.05);border-radius:14px;padding:16px;text-align:center;margin-bottom:16px}
.qemoji{font-size:54px;margin-bottom:10px}
.qstory{font-size:13px;color:rgba(255,255,255,.78);line-height:1.75}
.qquestion{font-size:15px;font-weight:bold;color:#fff;margin-top:10px}
.qopts{display:grid;gap:9px}
.qopt{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:13px;padding:13px 14px;color:#fff;font-size:14px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s}
.qopt:active{transform:scale(.97)}
.qopt.correct{background:rgba(40,167,69,.28);border-color:#28a745}
.qopt.wrong{background:rgba(220,53,69,.28);border-color:#dc3545}
.qopt.locked{pointer-events:none}
.qlbl{width:28px;height:28px;border-radius:50%;background:rgba(255,215,0,.15);display:flex;align-items:center;justify-content:center;font-weight:bold;color:#ffd700;font-size:13px;flex-shrink:0}
.qresult{display:none;border-radius:13px;padding:16px;text-align:center;margin-top:12px}
.qresult.ok{background:rgba(40,167,69,.2);border:1px solid #28a745}
.qresult.ng{background:rgba(220,53,69,.2);border:1px solid #dc3545}
.qr-emoji{font-size:46px}
.qr-title{font-size:17px;font-weight:bold;margin:8px 0 4px}
.qr-explain{font-size:13px;color:rgba(255,255,255,.72);line-height:1.65}
.btnNext,.btnFinish{display:none;width:100%;padding:14px;background:linear-gradient(135deg,#ffd700,#ff9500);color:#1a1a2e;font-size:16px;font-weight:bold;border:none;border-radius:13px;cursor:pointer;margin-top:14px}
.btnClose{width:100%;padding:11px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.18);border-radius:11px;cursor:pointer;font-size:14px;margin-top:8px}

/* ── Toast ── */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:800;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1}

/* ── 地圖提示 ── */
#mapHint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:rgba(255,255,255,.6);font-size:12px;padding:7px 14px;border-radius:12px;z-index:100;pointer-events:none;transition:opacity .5s}
</style>
</head>
<body>

<!-- 載入 -->
<div id="loading">
  <div class="logo">🧺</div>
  <h1>C.H 洗衣小鎮</h1>
  <p>小鎮正在甦醒中，請稍候...</p>
  <div class="bar"><div class="bar-fill"></div></div>
</div>

<div id="toast"></div>
<div id="mapHint">👆 拖動畫面探索小鎮，點擊居民對話！</div>

<!-- 頂部 -->
<div id="topBar" style="display:none">
  <div class="top-left">
    <div class="av" id="avEl">🧑</div>
    <div>
      <div class="pname" id="pname">載入中</div>
      <div class="plevel">✨ 洗衣小鎮探險家</div>
    </div>
  </div>
  <div class="top-title">🧺 洗衣小鎮</div>
</div>

<!-- 視窗 -->
<div id="viewport" style="display:none">
  <div id="world">
    <canvas id="mapCanvas"></canvas>
    <!-- NPC & 建築動態插入 -->
  </div>
</div>

<!-- 對話框 -->
<div id="dlgOverlay">
  <div class="dlg-sheet">
    <div class="dlg-handle"></div>
    <div class="dlg-head">
      <div class="dlg-av" id="dlgAv"></div>
      <div>
        <div class="dlg-who" id="dlgWho"></div>
        <div class="dlg-role" id="dlgRole"></div>
      </div>
    </div>
    <div class="dlg-text" id="dlgText"></div>
    <div class="dlg-opts" id="dlgOpts"></div>
  </div>
</div>

<!-- 店內場景 -->
<div id="shopOverlay">
  <div class="shop-panel">
    <div class="shop-scene" id="shopScene">
      <!-- 牆面裝飾 -->
      <div class="shop-wall-item" style="top:12px;left:16px">🧸</div>
      <div class="shop-wall-item" style="top:12px;left:70px">🌿</div>
      <div class="shop-wall-item" style="top:8px;right:70px">🏆</div>
      <div class="shop-wall-item" style="top:8px;right:16px">🌸</div>
      <div class="shop-wall-item" style="top:55px;left:16px;font-size:22px">📜</div>
      <div class="shop-wall-item" style="top:55px;right:18px;font-size:22px">🎖️</div>
      <!-- 洗衣機 -->
      <div style="position:absolute;bottom:62px;left:16px;font-size:40px">🫧</div>
      <div style="position:absolute;bottom:62px;left:58px;font-size:40px">🧴</div>
      <!-- 掛衣架 -->
      <div style="position:absolute;top:90px;left:50%;transform:translateX(-50%);font-size:13px;color:#666;white-space:nowrap">👕 &nbsp; 👔 &nbsp; 🧥 &nbsp; 👗</div>
      <!-- 員工 -->
      <div class="staff-figure">
        <div class="staff-emoji">🧑‍💼</div>
        <div class="staff-badge">C.H 精緻洗衣</div>
      </div>
      <!-- 收銀台 -->
      <div class="shop-counter">
        <div class="shop-counter-top"></div>
        <span style="font-size:28px">💻</span>
        <span style="font-size:24px">🪴</span>
        <span style="font-size:22px">📋</span>
      </div>
    </div>
    <div class="shop-info">
      <div class="shop-title">🏪 C.H 精緻洗衣</div>
      <div class="shop-desc">板橋區最專業的精緻洗衣服務！從日常衣物到奢侈品包包，我們都能細心呵護。歡迎光臨！</div>
      <div class="shop-services">
        <div class="svc-card"><div class="svc-icon">👔</div><div class="svc-name">精緻衣物</div><div class="svc-desc">西裝、禮服、羽絨</div></div>
        <div class="svc-card"><div class="svc-icon">👟</div><div class="svc-name">球鞋清潔</div><div class="svc-desc">各種材質皆可</div></div>
        <div class="svc-card"><div class="svc-icon">👜</div><div class="svc-name">名牌包保養</div><div class="svc-desc">LV、Chanel、Gucci</div></div>

<!-- 解謎 -->
<div id="quizOverlay">
  <div class="quiz-sheet">
    <div class="qhd">
      <div class="qhd-title">🔬 污漬解謎挑戰</div>
      <div class="qstep" id="qstep">1/3</div>
    </div>
    <div class="qscene">
      <div class="qemoji" id="qemoji"></div>
      <div class="qstory" id="qstory"></div>
      <div class="qquestion" id="qqestion"></div>
    </div>
    <div class="qopts" id="qopts"></div>
    <div class="qresult" id="qresult">
      <div class="qr-emoji" id="qrEmoji"></div>
      <div class="qr-title" id="qrTitle"></div>
      <div class="qr-explain" id="qrExplain"></div>
    </div>
    <button class="btnNext" id="btnNext" onclick="nextQ()">下一題 →</button>
    <button class="btnFinish" id="btnFinish" onclick="finishQuiz()">完成挑戰 🎉</button>
    <button class="btnClose" onclick="closeQuiz()">關閉</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  常數
// ═══════════════════════════════════════════
const LIFF_ID  = '2008313382-NFMAIRRS';
const API_BASE = 'https://stain-bot-production-2593.up.railway.app';
const MAP_W = 1800, MAP_H = 1200;

// ═══════════════════════════════════════════
//  拖曳 — 只移動 #world 一個 div
// ═══════════════════════════════════════════
let camX=0, camY=0;
let dragActive=false, dragStartX=0, dragStartY=0, dragCamX=0, dragCamY=0;
let lastTouchX=0, lastTouchY=0;
let velX=0, velY=0;
let rafId=null;

function clampCam(){
  const vw=window.innerWidth, vh=window.innerHeight-56;
  camX = Math.max(0, Math.min(MAP_W-vw,  camX));
  camY = Math.max(0, Math.min(MAP_H-vh, camY));
}
function applyCamera(){
  document.getElementById('world').style.transform=`translate(${-camX}px,${-camY}px)`;
}
function inertiaTick(){
  if(Math.abs(velX)<0.3 && Math.abs(velY)<0.3){ cancelAnimationFrame(rafId); return; }
  velX*=0.88; velY*=0.88;
  camX+=velX; camY+=velY;
  clampCam(); applyCamera();
  rafId=requestAnimationFrame(inertiaTick);
}

function initDrag(){
  const vp=document.getElementById('viewport');
  // Touch
  vp.addEventListener('touchstart',e=>{
    cancelAnimationFrame(rafId); velX=0; velY=0;
    const t=e.touches[0];
    dragActive=true; dragStartX=t.clientX; dragStartY=t.clientY;
    dragCamX=camX; dragCamY=camY;
    lastTouchX=t.clientX; lastTouchY=t.clientY;
  },{passive:true});
  vp.addEventListener('touchmove',e=>{
    if(!dragActive) return;
    const t=e.touches[0];
    velX = lastTouchX - t.clientX;
    velY = lastTouchY - t.clientY;
    lastTouchX=t.clientX; lastTouchY=t.clientY;
    camX = dragCamX + (dragStartX - t.clientX);
    camY = dragCamY + (dragStartY - t.clientY);
    clampCam(); applyCamera();
  },{passive:true});
  vp.addEventListener('touchend',e=>{
    dragActive=false;
    if(e.changedTouches.length===1){
      const dx=e.changedTouches[0].clientX-dragStartX;
      const dy=e.changedTouches[0].clientY-dragStartY;
      if(Math.abs(dx)+Math.abs(dy) < 8) return; // tap, 不慣性
    }
    rafId=requestAnimationFrame(inertiaTick);
  },{passive:true});
  // Mouse
  vp.addEventListener('mousedown',e=>{
    cancelAnimationFrame(rafId); velX=0; velY=0;
    dragActive=true; dragStartX=e.clientX; dragStartY=e.clientY;
    dragCamX=camX; dragCamY=camY; vp.classList.add('dragging');
  });
  window.addEventListener('mousemove',e=>{
    if(!dragActive) return;
    velX = dragCamX + (dragStartX - e.clientX) - camX;
    velY = dragCamY + (dragStartY - e.clientY) - camY;
    camX = dragCamX + (dragStartX - e.clientX);
    camY = dragCamY + (dragStartY - e.clientY);
    clampCam(); applyCamera();
  });
  window.addEventListener('mouseup',e=>{
    if(!dragActive) return; dragActive=false;
    document.getElementById('viewport').classList.remove('dragging');
    const dx=e.clientX-dragStartX, dy=e.clientY-dragStartY;
    if(Math.abs(dx)+Math.abs(dy) < 8) return;
    rafId=requestAnimationFrame(inertiaTick);
  });
}

// ═══════════════════════════════════════════
//  地圖繪製
// ═══════════════════════════════════════════
function drawMap(){
  const cv=document.getElementById('mapCanvas');
  cv.width=MAP_W; cv.height=MAP_H;
  const c=cv.getContext('2d');

  // 天空
  const sky=c.createLinearGradient(0,0,0,MAP_H*.42);
  sky.addColorStop(0,'#08163a'); sky.addColorStop(.5,'#0d2d6e'); sky.addColorStop(1,'#1a4a9e');
  c.fillStyle=sky; c.fillRect(0,0,MAP_W,MAP_H*.42);

  // 星星
  c.fillStyle='rgba(255,255,255,.8)';
  [[80,40],[220,22],[460,65],[710,18],[990,50],[1280,28],[1520,70],[1700,35],[150,100],[600,88],[1100,42],[1650,110]].forEach(([x,y])=>{
    c.beginPath(); c.arc(x,y,Math.random()*.8+.8,0,Math.PI*2); c.fill();
  });
  // 月亮
  c.fillStyle='rgba(255,255,220,.95)';
  c.beginPath(); c.arc(1680,55,28,0,Math.PI*2); c.fill();
  c.fillStyle='rgba(20,50,120,.6)';
  c.beginPath(); c.arc(1690,50,22,0,Math.PI*2); c.fill();

  // 山脈輪廓
  c.fillStyle='#0d2550';
  [[0,320,200,180],[180,300,260,220],[400,290,300,200],[660,310,240,190],[860,280,320,210],[1140,300,280,200],[1380,290,260,180],[1600,310,240,200]].forEach(([x,y,w,h])=>{
    c.beginPath(); c.moveTo(x,MAP_H*.42); c.lineTo(x+w/2,y); c.lineTo(x+w,MAP_H*.42); c.fill();
  });

  // 地面層
  const grd=c.createLinearGradient(0,MAP_H*.38,0,MAP_H);
  grd.addColorStop(0,'#1e5c18'); grd.addColorStop(.15,'#286e20'); grd.addColorStop(.35,'#339128'); grd.addColorStop(1,'#1a4c14');
  c.fillStyle=grd; c.fillRect(0,MAP_H*.38,MAP_W,MAP_H*.62);

  // 廣場石板（主要中心區）
  c.fillStyle='#6b7a8d';
  c.beginPath(); c.roundRect(680,MAP_H*.44,440,300,20); c.fill();
  // 石板格紋
  c.strokeStyle='rgba(255,255,255,.08)'; c.lineWidth=1.5;
  for(let i=0;i<5;i++){ c.beginPath(); c.moveTo(680,MAP_H*.44+i*60); c.lineTo(1120,MAP_H*.44+i*60); c.stroke(); }
  for(let i=0;i<7;i++){ c.beginPath(); c.moveTo(680+i*65,MAP_H*.44); c.lineTo(680+i*65,MAP_H*.44+300); c.stroke(); }

  // 主幹道（橫向）
  c.fillStyle='#4a5568';
  c.fillRect(0,MAP_H*.56,MAP_W,100);
  c.fillStyle='#3d4756';
  c.fillRect(0,MAP_H*.56+100,MAP_W,30);
  c.fillStyle='#3d4756';
  c.fillRect(0,MAP_H*.56-18,MAP_W,22);

  // 縱向道路
  c.fillStyle='#4a5568';
  c.fillRect(610,MAP_H*.38,100,MAP_H*.62);
  c.fillRect(1120,MAP_H*.38,100,MAP_H*.62);

  // 路中線（橫）
  c.setLineDash([35,22]);
  c.strokeStyle='rgba(255,255,180,.45)'; c.lineWidth=3;
  c.beginPath(); c.moveTo(0,MAP_H*.56+50); c.lineTo(MAP_W,MAP_H*.56+50); c.stroke();
  // 路中線（縱）
  c.beginPath(); c.moveTo(660,MAP_H*.38); c.lineTo(660,MAP_H); c.stroke();
  c.beginPath(); c.moveTo(1170,MAP_H*.38); c.lineTo(1170,MAP_H); c.stroke();
  c.setLineDash([]);

  // 人行道
  c.fillStyle='#7c8a9c';
  c.fillRect(0,MAP_H*.56-18,MAP_W,18);
  c.fillRect(0,MAP_H*.56+100,MAP_W,18);

  // 公園區域（左下）
  const park=c.createRadialGradient(240,900,20,240,900,150);
  park.addColorStop(0,'#3da832'); park.addColorStop(1,'#286e20');
  c.fillStyle=park;
  c.beginPath(); c.ellipse(240,900,160,120,0,0,Math.PI*2); c.fill();
  // 公園小路
  c.fillStyle='rgba(180,160,100,.5)';
  c.beginPath(); c.ellipse(240,900,70,50,0,0,Math.PI*2); c.fill();

  // 噴水池
  const pond=c.createRadialGradient(900,920,10,900,920,90);
  pond.addColorStop(0,'#5bc8f5'); pond.addColorStop(.6,'#2a9cd4'); pond.addColorStop(1,'#1a72a8');
  c.fillStyle=pond;
  c.beginPath(); c.ellipse(900,920,95,65,0,0,Math.PI*2); c.fill();
  c.strokeStyle='rgba(255,255,255,.4)'; c.lineWidth=2.5; c.stroke();
  // 噴水效果
  c.fillStyle='rgba(255,255,255,.6)';
  [[900,880],[888,868],[912,872],[898,860]].forEach(([x,y])=>{
    c.beginPath(); c.ellipse(x,y,4,8,-0.2,0,Math.PI*2); c.fill();
  });

  // 右下角小湖
  const lake=c.createRadialGradient(1550,950,20,1550,950,110);
  lake.addColorStop(0,'#4db8dc'); lake.addColorStop(1,'#1a6888');
  c.fillStyle=lake;
  c.beginPath(); c.ellipse(1550,950,120,80,.3,0,Math.PI*2); c.fill();
  c.strokeStyle='rgba(100,200,255,.3)'; c.lineWidth=2; c.stroke();

  // 草叢裝飾（隨機分布）
  c.fillStyle='#3a8a30';
  [[100,480],[340,490],[530,470],[780,470],[1000,480],[1280,475],[1450,485],[1680,470],
   [50,750],[300,760],[500,740],[1350,760],[1650,750]].forEach(([x,y])=>{
    c.beginPath(); c.arc(x,y,20,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(x-16,y+10,16,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(x+16,y+10,16,0,Math.PI*2); c.fill();
  });

  // 花壇
  [['#ff6bae',160,500],['#ffd700',380,495],['#ff8c42',1050,500],
   ['#a78bfa',1320,492],['#ff6bae',1700,498],['#4df5c8',250,760]].forEach(([col,x,y])=>{
    for(let i=0;i<6;i++){
      c.fillStyle=col;
      c.beginPath();
      c.arc(x+Math.cos(i*Math.PI/3)*9, y+Math.sin(i*Math.PI/3)*9, 5.5, 0, Math.PI*2);
      c.fill();
    }
    c.fillStyle='#fff'; c.beginPath(); c.arc(x,y,4.5,0,Math.PI*2); c.fill();
  });

  // 路燈底座
  c.fillStyle='#888';
  [[200,490],[550,490],[1080,490],[1400,490],[1720,490]].forEach(([x,y])=>{
    c.fillRect(x-4,y,8,40); c.beginPath(); c.arc(x,y,6,0,Math.PI*2); c.fill();
  });

  // 圍欄
  c.strokeStyle='rgba(180,140,80,.7)'; c.lineWidth=3;
  c.beginPath(); c.roundRect(680,MAP_H*.44,440,300,20); c.stroke();

  // 廣場中心裝飾圓
  c.strokeStyle='rgba(255,215,0,.3)'; c.lineWidth=2;
  c.beginPath(); c.arc(900,MAP_H*.44+150,60,0,Math.PI*2); c.stroke();
  c.beginPath(); c.arc(900,MAP_H*.44+150,30,0,Math.PI*2); c.stroke();
}

let npcEls={}, npcState={};

function spawnNPCs(){
  const w=document.getElementById('world');
  NPCS.forEach(n=>{
    const el=document.createElement('div');
    el.className='npc-wrap';
    el.id='npc_'+n.id;
    el.style.cssText=`left:${n.bx}px;top:${n.by}px`;
    el.innerHTML=`<div class="npc-body idle-anim">${n.e}</div><div class="npc-shadow"></div><div class="npc-tag">${n.name}</div>`;
    el.addEventListener('click', ev=>{ ev.stopPropagation(); openDlg(n.id); });
    w.appendChild(el);
    npcEls[n.id]=el;
    npcState[n.id]={ x:n.bx, y:n.by, tx:n.bx, ty:n.by, wait:Math.random()*200, dir:1 };
  });
}

// NPC 移動（requestAnimationFrame，比 setInterval 流暢）
let lastNpcTick=0;
function npcLoop(ts){
  if(ts-lastNpcTick > 33){ // ~30fps
    lastNpcTick=ts;
    NPCS.forEach(n=>{
      const el=npcEls[n.id], st=npcState[n.id];
      if(!el||!st) return;
      const dx=st.tx-st.x, dy=st.ty-st.y;
      const dist=Math.hypot(dx,dy);
      if(dist<1.5){
        st.wait--;
        if(st.wait<=0){
          st.tx=n.bx+(Math.random()-.5)*110;
          st.ty=n.by+(Math.random()-.5)*60;
          st.tx=Math.max(30,Math.min(MAP_W-60,st.tx));
          st.ty=Math.max(300,Math.min(MAP_H-100,st.ty));
          st.wait=100+Math.random()*220;
          el.querySelector('.npc-body').className='npc-body idle-anim';
        }
      } else {
        const spd=0.55;
        st.x+=dx/dist*spd; st.y+=dy/dist*spd;
        el.style.left=st.x+'px'; el.style.top=st.y+'px';
        const body=el.querySelector('.npc-body');
        body.className='npc-body walk-anim';
        body.style.transform=dx<0?'scaleX(-1)':'scaleX(1)';
      }
    });
  }
  requestAnimationFrame(npcLoop);
}

let curNpc=null;
function openDlg(id){
  curNpc=NPCS.find(n=>n.id===id);
  if(!curNpc) return;
  renderDlg(curNpc.dlg);
  document.getElementById('dlgOverlay').classList.add('show');
  // 泡泡
  const el=npcEls[id];
  let b=el.querySelector('.npc-bubble');
  if(b) b.remove();
  b=document.createElement('div');
  b.className='npc-bubble'; b.textContent='...';
  el.appendChild(b);
  setTimeout(()=>{ if(b.parentNode) b.remove(); },3000);
}
function renderDlg(dlg){
  document.getElementById('dlgAv').textContent=curNpc.e;
  document.getElementById('dlgWho').textContent=curNpc.name;
  document.getElementById('dlgRole').textContent=curNpc.role;
  document.getElementById('dlgText').textContent=dlg.text;
  const oc=document.getElementById('dlgOpts');
  oc.innerHTML='';
  dlg.opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='cBtn';
    btn.innerHTML=`<span>${o.i}</span>${o.t}`;
    btn.onclick=()=>handleOpt(o);
    oc.appendChild(btn);
  });
}
function handleOpt(o){
  if(o.action==='quiz'){ closeDlg(); openQuiz(); return; }
  if(o.close){ closeDlg(); return; }
  if(o.n && curNpc.extra && curNpc.extra[o.n]) renderDlg(curNpc.extra[o.n]);
}
function closeDlg(){ document.getElementById('dlgOverlay').classList.remove('show'); curNpc=null; }
document.getElementById('dlgOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeDlg(); });

    question:'第一步最佳處理方式？',
    opts:[
      {lbl:'A',text:'立刻用冷水沖洗，從外圍往內輕拍',ok:true},
      {lbl:'B',text:'用熱水燙，讓污漬融化',ok:false},
      {lbl:'C',text:'直接揉搓讓污漬分散',ok:false},
      {lbl:'D',text:'先放著等乾了再說',ok:false},
    ],
    explain:'咖啡是水溶性污漬，要立刻用冷水（不是熱水！）從外往內輕拍。熱水會讓蛋白質固化，更難處理！' },
  { emoji:'🛢️', story:'👨 林先生：「修車時機油沾到西裝褲，救得回來嗎？」',
    question:'機油污漬最正確的處理方式？',
    opts:[
      {lbl:'A',text:'直接泡水用力搓洗',ok:false},
      {lbl:'B',text:'用去漬劑或洗碗精預處理後再送洗',ok:true},
      {lbl:'C',text:'用漂白水漂白',ok:false},
      {lbl:'D',text:'直接丟進洗衣機',ok:false},
    ],
    explain:'機油是油脂類污漬，純水洗效果差。要先用去漬劑或含界面活性劑的洗碗精預處理，分解油脂後才送洗！' },
  { emoji:'🍷', story:'👧 小婉：「紅酒濺到白色洋裝，已經過了一個晚上...」',
    question:'隔夜紅酒污漬，哪個方式最有效？',
    opts:[
      {lbl:'A',text:'用熱水直接搓洗',ok:false},
      {lbl:'B',text:'直接漂白',ok:false},
      {lbl:'C',text:'送專業洗衣店，說明污漬類型和時間',ok:true},
      {lbl:'D',text:'泡冷水三天',ok:false},
    ],
    explain:'隔夜紅酒已氧化，家庭處理效果有限。最佳方式是送專業洗衣店，並詳細說明污漬類型和時間，讓師傅判斷！' },
];

let curQ=0, correctCnt=0;

function openQuiz(){
  const todayKey=new Date().toISOString().substring(0,10);
  const done=localStorage.getItem('quiz_'+((window._uid)||'dev'));
  if(done===todayKey){ showToast('今天已完成解謎！明天再來 😊'); return; }
  curQ=0; correctCnt=0;
  ['btnNext','btnFinish'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('qresult').style.display='none';
  renderQ();
  document.getElementById('quizOverlay').classList.add('show');
}
function renderQ(){
  const q=QUESTIONS[curQ];
  document.getElementById('qstep').textContent=`${curQ+1}/${QUESTIONS.length}`;
  document.getElementById('qemoji').textContent=q.emoji;
  document.getElementById('qstory').textContent=q.story;
  document.getElementById('qqestion').textContent=q.question;
  document.getElementById('qresult').style.display='none';
  ['btnNext','btnFinish'].forEach(id=>document.getElementById(id).style.display='none');
  const oc=document.getElementById('qopts');
  oc.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='qopt';
    btn.innerHTML=`<span class="qlbl">${o.lbl}</span>${o.text}`;
    btn.onclick=()=>answerQ(i);
    oc.appendChild(btn);
  });
}
function answerQ(idx){
  const q=QUESTIONS[curQ];
  document.querySelectorAll('.qopt').forEach(b=>b.classList.add('locked'));
  q.opts.forEach((o,i)=>{
    const btns=document.querySelectorAll('.qopt');
    if(o.ok) btns[i].classList.add('correct');
    else if(i===idx) btns[i].classList.add('wrong');
  });
  const ok=q.opts[idx].ok;
  if(ok) correctCnt++;
  const rb=document.getElementById('qresult');
  rb.style.display='block';
  rb.className='qresult '+(ok?'ok':'ng');
  document.getElementById('qrEmoji').textContent=ok?'🎉':'😅';
  document.getElementById('qrTitle').textContent=ok?'答對了！厲害！':'答錯了...';
  document.getElementById('qrExplain').textContent=q.explain;
  if(curQ<QUESTIONS.length-1) document.getElementById('btnNext').style.display='block';
  else {
    document.getElementById('btnFinish').style.display='block';
    localStorage.setItem('quiz_'+(window._uid||'dev'), new Date().toISOString().substring(0,10));
  }
}
function nextQ(){ curQ++; renderQ(); }
function finishQuiz(){ closeQuiz(); showToast(`✅ 挑戰完成！答對 ${correctCnt}/${QUESTIONS.length} 題`); }
function closeQuiz(){ document.getElementById('quizOverlay').classList.remove('show'); }
document.getElementById('quizOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeQuiz(); });

// ═══════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════
let toastTimer=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}

// ═══════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════
async function init(){
  // LIFF
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const p=await liff.getProfile();
    window._uid=p.userId;
    document.getElementById('pname').textContent=p.displayName||'探險家';
    // 載入後端玩家資料
    try{
      const r=await fetch(`${API_BASE}/api/game/player/${p.userId}`);
      const d=await r.json();
    }catch(e){}
  }catch(e){
    window._uid='dev_'+Date.now();
    document.getElementById('pname').textContent='開發模式';
  }

  // 建立世界
  drawMap();
  spawnClouds();
  spawnBuildings();
  spawnNPCs();
  initDrag();

  // 初始鏡頭（以 C.H 洗衣店為中心）
  camX=Math.max(0,(MAP_W-window.innerWidth)/2-250);
  camY=Math.max(0,(MAP_H-(window.innerHeight-56))/2-80);
  clampCam(); applyCamera();

  // 顯示 App
  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    document.getElementById('topBar').style.display='flex';
    document.getElementById('viewport').style.display='block';
    setTimeout(()=>{ document.getElementById('mapHint').style.opacity='0'; },4000);
    showToast('👋 歡迎來到洗衣小鎮！點擊居民和建築探索吧！');
    // 啟動 NPC 迴圈
    requestAnimationFrame(npcLoop);
  },2000);
}

init();
</script>
