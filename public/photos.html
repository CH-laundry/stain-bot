<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>C.H 精緻洗衣 · 清洗紀錄</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cream: #f7f4ef; --warm: #ede8e0; --gold: #b8966e;
  --dark: #2a2420; --mid: #6b5d52; --light: #a09080;
  --before: #1a4a3a; --after: #3a1a1a; --white: #ffffff;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }
.header { background: var(--dark); padding: 24px 20px 20px; text-align: center; position: relative; }
.header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.brand { font-family: 'Noto Serif TC', serif; font-size: 11px; letter-spacing: 4px; color: var(--gold); margin-bottom: 6px; }
.brand-name { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 600; color: var(--white); letter-spacing: 2px; }
.brand-sub { font-size: 12px; color: var(--light); margin-top: 4px; letter-spacing: 1px; }
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 20px; }
.loading-dot { display: flex; gap: 8px; }
.loading-dot span { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
.loading-dot span:nth-child(2) { animation-delay: 0.2s; }
.loading-dot span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1.1)} }
.loading-text { font-size: 13px; color: var(--light); letter-spacing: 1px; }
.customer-section { padding: 28px 20px 0; max-width: 500px; margin: 0 auto; }
.customer-card { background: var(--white); border-radius: 16px; padding: 20px 22px; display: flex; align-items: center; gap: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); border: 1px solid var(--warm); animation: fadeUp .5s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.customer-avatar { width: 52px; height: 52px; background: linear-gradient(135deg, var(--dark), var(--mid)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden; }
.customer-avatar img { width: 100%; height: 100%; object-fit: cover; }
.customer-name { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 600; color: var(--dark); }
.customer-label { font-size: 12px; color: var(--light); margin-top: 2px; letter-spacing: .5px; }
.content { padding: 24px 16px 48px; max-width: 500px; margin: 0 auto; }
.section-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; margin-top: 28px; }
.section-divider::before,.section-divider::after { content: ''; flex: 1; height: 1px; background: var(--warm); }
.section-label { font-size: 11px; letter-spacing: 2.5px; color: var(--light); text-transform: uppercase; white-space: nowrap; }
.record-card { background: var(--white); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.07); border: 1px solid var(--warm); margin-bottom: 20px; animation: fadeUp .5s ease both; }
.record-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; background: var(--dark); }
.record-date { font-size: 13px; color: rgba(255,255,255,.6); letter-spacing: .5px; }
.record-item-badge { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; color: var(--gold); background: rgba(184,150,110,.15); border: 1px solid rgba(184,150,110,.3); padding: 4px 12px; border-radius: 20px; }
.photo-compare { display: grid; grid-template-columns: 1fr 1fr; }
.photo-col { padding: 14px; }
.photo-col:first-child { border-right: 1px solid var(--warm); }
.photo-col-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.photo-col-label::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
.photo-col.before .photo-col-label { color: var(--before); }
.photo-col.before .photo-col-label::before { background: var(--before); }
.photo-col.after .photo-col-label { color: var(--after); }
.photo-col.after .photo-col-label::before { background: var(--after); }
.photo-col img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 10px; cursor: pointer; transition: opacity .2s; }
.photo-col img:active { opacity: .8; }
.photo-empty { width: 100%; aspect-ratio: 3/4; background: var(--cream); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; border: 1.5px dashed var(--warm); color: var(--light); }
.photo-empty-icon { font-size: 24px; opacity: .4; }
.photo-empty-text { font-size: 11px; letter-spacing: .5px; }
.record-footer { padding: 10px 18px; border-top: 1px solid var(--warm); display: flex; justify-content: flex-end; }
.timestamp { font-size: 11px; color: var(--light); }
.empty-state { text-align: center; padding: 48px 20px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .3; }
.empty-text { font-size: 14px; color: var(--light); line-height: 1.8; }
.error-state { text-align: center; padding: 48px 20px; }
.error-text { font-size: 14px; color: #c0392b; line-height: 1.8; margin-top: 12px; }
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.96); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.lightbox.show { display: flex; }
.lightbox img { max-width: 100%; max-height: 90vh; object-fit: contain; border-radius: 8px; }
.lightbox-close { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; cursor: pointer; }
.page-footer { text-align: center; padding: 20px; font-size: 11px; color: var(--light); letter-spacing: 1px; border-top: 1px solid var(--warm); }
</style>
</head>
<body>

<div class="header">
  <div class="brand">Laundry Records</div>
  <div class="brand-name">C.H 精緻洗衣</div>
  <div class="brand-sub">清洗紀錄照片</div>
</div>

<div id="app">
  <div class="loading-screen">
    <div class="loading-dot"><span></span><span></span><span></span></div>
    <div class="loading-text">讀取中</div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close">✕</div>
  <img id="lightboxImg" src="">
</div>

<script>
var LIFF_ID = '2008313382-1Pgql9FR';

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    var profile = await liff.getProfile();
    var userId = profile.userId;
    var displayName = profile.displayName;
    var pictureUrl = profile.pictureUrl || '';

    // 用 userId 查會員編號
    var customerNo = '';
    var customerName = displayName;

    try {
      var cRes = await fetch('/api/customer-numbers');
      var cData = await cRes.json();
      if (cData.success) {
        var found = (cData.customers || []).find(function(c) {
          return c.userId === userId;
        });
        if (found) {
          customerNo = String(found.number).replace(/\D/g,'').replace(/^0+/,'');
          customerName = found.name || displayName;
        }
      }
    } catch(e) {}

    if (!customerNo) {
      renderEmpty(customerName, pictureUrl);
      return;
    }

    // 查照片
    var photos = [];
    try {
      var res = await fetch('/api/photos/' + customerNo);
      var data = await res.json();
      photos = data.photos || [];
    } catch(e) {}

    render(customerName, pictureUrl, photos);

  } catch(e) {
    renderError('載入失敗，請關閉後重試');
  }
}

function render(customerName, pictureUrl, photos) {
  // 按品項分組
  var groups = {};
  photos.forEach(function(p) {
    var key = p.itemType;
    if (!groups[key]) groups[key] = { itemType: p.itemType, before: null, after: null, date: '' };
    if (p.phase === 'before' && !groups[key].before) {
      groups[key].before = p;
      groups[key].date = new Date(p.date).toLocaleDateString('zh-TW');
    }
    if (p.phase === 'after' && !groups[key].after) {
      groups[key].after = p;
      if (!groups[key].date) groups[key].date = new Date(p.date).toLocaleDateString('zh-TW');
    }
  });

  var groupList = Object.values(groups);
  var recordsHtml = '';

  if (groupList.length === 0) {
    recordsHtml = '<div class="empty-state"><div class="empty-icon">🧺</div><div class="empty-text">目前尚無清洗紀錄照片<br>完成清洗後將會在這裡顯示</div></div>';
  } else {
    groupList.forEach(function(g, idx) {
      var delay = (idx * 0.1).toFixed(1);
      recordsHtml +=
        '<div class="record-card" style="animation-delay:' + delay + 's">' +
        '<div class="record-header">' +
        '<span class="record-date">📅 ' + (g.date || '-') + '</span>' +
        '<span class="record-item-badge">' + g.itemType + '</span>' +
        '</div>' +
        '<div class="photo-compare">' +
        '<div class="photo-col before"><div class="photo-col-label">清洗前</div>' +
        (g.before ? '<img src="' + g.before.url + '" loading="lazy" onclick="openLightbox(\'' + g.before.url + '\')">' : '<div class="photo-empty"><div class="photo-empty-icon">📷</div><div class="photo-empty-text">待拍照</div></div>') +
        '</div>' +
        '<div class="photo-col after"><div class="photo-col-label">清洗後</div>' +
        (g.after ? '<img src="' + g.after.url + '" loading="lazy" onclick="openLightbox(\'' + g.after.url + '\')">' : '<div class="photo-empty"><div class="photo-empty-icon">✨</div><div class="photo-empty-text">待拍照</div></div>') +
        '</div>' +
        '</div>' +
        '<div class="record-footer"><span class="timestamp">C.H 精緻洗衣 · ' + (g.date || '') + '</span></div>' +
        '</div>';
    });
  }

  buildPage(customerName, pictureUrl, recordsHtml);
}

function renderEmpty(customerName, pictureUrl) {
  var recordsHtml = '<div class="empty-state"><div class="empty-icon">🧺</div><div class="empty-text">目前尚無清洗紀錄照片<br>完成清洗後將會在這裡顯示</div></div>';
  buildPage(customerName, pictureUrl, recordsHtml);
}

function buildPage(customerName, pictureUrl, recordsHtml) {
  var avatarHtml = pictureUrl ? '<img src="' + pictureUrl + '" alt="">' : '👤';
  document.getElementById('app').innerHTML =
    '<div class="customer-section">' +
    '<div class="customer-card">' +
    '<div class="customer-avatar">' + avatarHtml + '</div>' +
    '<div>' +
    '<div class="customer-name">' + customerName + '</div>' +
    '<div class="customer-label">您的清洗紀錄照片</div>' +
    '</div></div></div>' +
    '<div class="content">' +
    '<div class="section-divider"><span class="section-label">清洗紀錄</span></div>' +
    recordsHtml +
    '</div>' +
    '<div class="page-footer">C.H 精緻洗衣 · 板橋區</div>';
}

function renderError(msg) {
  document.getElementById('app').innerHTML =
    '<div class="content"><div class="error-state"><div style="font-size:40px">⚠️</div><div class="error-text">' + msg + '</div></div></div>';
}

init();
</script>
</body>
</html>
